# Cloud Build → Artifact Registry → Cloud Run (API).
# Optimizations vs cold builds:
# - buildx registry cache (:buildcache, mode=max) keeps multi-stage layers
#   (pnpm install, turbo build) — inline cache on the slim runner image does not
# - Tag :latest alongside :$COMMIT_SHA for a stable deploy/pull reference
# - E2_HIGHCPU_8 speeds install/compile (usually shorter wall time than default)
#
# Submit from monorepo root:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=COMMIT_SHA=$(git rev-parse --short HEAD) .

substitutions:
  _REGION: europe-west1
  _AR_REPO: toonexpo
  _SERVICE: toonexpo-api
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/api

steps:
  - id: "Create buildx builder"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "buildx"
      - "create"
      - "--name"
      - "toonexpo-builder"
      - "--driver"
      - "docker-container"
      - "--use"

  - id: "Build and push API image"
    name: "gcr.io/cloud-builders/docker"
    env:
      - "DOCKER_BUILDKIT=1"
    args:
      - "buildx"
      - "build"
      - "--builder=toonexpo-builder"
      - "--cache-from=type=registry,ref=${_IMAGE}:buildcache"
      - "--cache-to=type=registry,ref=${_IMAGE}:buildcache,mode=max"
      - "-f"
      - "apps/api/Dockerfile"
      - "-t"
      - "${_IMAGE}:$COMMIT_SHA"
      - "-t"
      - "${_IMAGE}:latest"
      - "--push"
      - "."

  - id: "Deploy API to Cloud Run"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "services"
      - "update"
      - "${_SERVICE}"
      - "--image=${_IMAGE}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--project=$PROJECT_ID"
      - "--quiet"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
